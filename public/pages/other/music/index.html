    <style>
      :root {
        --bg-start: #0a1a2e;
        --bg-end: #1a2a4e;
        --highlight: #ffffff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg-start) 0, var(--bg-end) 100%);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        color: var(--highlight);
        padding: 20px;
      }
      .god-rays {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 550px;
        --stripes: repeating-linear-gradient(
          100deg,
          rgba(20, 40, 60, 0.8) 0%,
          rgba(20, 40, 60, 0.8) 7%,
          transparent 10%,
          transparent 12%,
          rgba(20, 40, 60, 0.8) 16%
        );
        --rays: repeating-linear-gradient(
          100deg,
          rgba(30, 50, 90, 0.9) 10%,
          rgba(20, 40, 80, 0.9) 15%,
          rgba(30, 50, 90, 0.9) 20%,
          rgba(20, 40, 80, 0.9) 25%,
          rgba(30, 50, 90, 0.9) 30%
        );
        background-image: var(--stripes), var(--rays);
        background-size: 300%, 200%;
        background-position:
          50% 50%,
          50% 50%;
        animation: fadeIn 2s ease;
        mask-image: radial-gradient(ellipse at 100% 0%, rgba(255, 255, 255, 0) 40%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at 100% 0%, white 40%, transparent 70%);
        pointer-events: none;
        z-index: -1;
      }
      .god-rays::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: var(--stripes), var(--rays);
        background-size: 200%, 100%;
        animation: god-rays 40s linear infinite;
        background-attachment: fixed;
        mix-blend-mode: difference;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes god-rays {
        0% {
          background-position:
            0 0,
            0 0;
        }
        100% {
          background-position:
            400% 400%,
            400% 400%;
        }
      }
      .search-container {
        width: 100%;
        max-width: 560px;
        margin-bottom: 20px;
        z-index: 100;
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
      }
      .search-input {
        width: 100%;
        padding: 12px 20px;
        border-radius: 12px;
        border: none;
        font-family: Inter, sans-serif;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.1);
        color: var(--highlight);
        outline: 0;
        transition: all 0.2s ease;
        backdrop-filter: blur(5px);
      }
      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }
      .search-input:focus {
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      }
      .search-results {

        max-width: 560px;
        max-height: 400px;
        background: rgba(10, 26, 46, 0.7);
        backdrop-filter: blur(10px);

        overflow-y: auto;
        opacity: 0;
        transform: translateX(-50%) translateY(-7px);
        visibility: hidden;
        transition: all 0.2s ease;
        z-index: 99;
        position: absolute;
        top: 75px;
        left: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .search-results.active {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        visibility: visible;
      }
      .result-item {

        align-items: center;
        padding: 10px 14px;
        cursor: pointer;
        transition: background 0.2s;
        overflow: hidden;
      }
      .result-item:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .result-img {
        width: 50px;
        height: 50px;
        border-radius: 6px;
        overflow: hidden;
        margin-right: 12px;
        flex-shrink: 0;
      }
      .result-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .result-info {
        flex: 1;
      }
      .result-title {
        font-weight: 600;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--highlight);
        font-size: 14px;
      }
      .result-artist {
        font-size: 12px;
        opacity: 0.7;
        color: var(--highlight);
      }

        justify-content: space-between;
        width: 100%;
        max-width: 1200px;
        margin-top: 80px;
      }

        margin-left: 20px;

        flex-direction: column;
        gap: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);

      }

        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }

        font-weight: 600;
        margin-bottom: 10px;
        text-align: center;

        border: 1px solid rgba(255, 255, 255, 0.1);

        justify-content: center;

        border-radius: 3px;

        border-radius: 3px;

        color: var(--highlight);

        padding-left: 0;

        text-align: left;

        padding-right: 10px;
        font-size: 14px;
        line-height: 1.6;
        color: var(--highlight);

        width: 4px;

        background: rgba(255, 255, 255, 0.05);
        border-radius: 3px;
      }

        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }
      .lyric-line {
        transition: all 0.2s ease;
        color: #999;
        opacity: 0.4;

        margin: 3px 0;

        line-height: 1.6;
        font-size: 12px;

      .lyric-line.active {
        color: var(--highlight);
        font-weight: 700;
        opacity: 1;
        font-size: 14px;
        filter: blur(0px);
      }

        color: #ccc;
        opacity: 0.7;
        filter: blur(0.6px);
      }
      .lyric-line.prev {
        color: #bbb;
        opacity: 0.55;
        filter: blur(1px);
      }
      .error-message {
        color: #ff4d4d;
        text-align: center;
        margin-top: 10px;
        font-size: 12px;
      }
    </style>
  </head>
