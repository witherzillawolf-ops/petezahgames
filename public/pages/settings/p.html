    <style>
      body {

      }
      .left-panel {
        height: 160px;
        background-image: url('bg_alt.jpeg');

      .right-panel {

        flex-direction: column;

      .brand {

      }
      .moon-icon {
        width: 18px;

        background: #fff;
        border-radius: 50%;

      }
      .moon-icon::after {
        content: '';

      .welcome-title {

      .form-group {
        margin-bottom: 1rem;
      }
      .form-label {
        display: block;
        color: #cde;
        font-size: 0.85rem;

      }
      .form-input {
        width: 100%;
        background: 0 0;

        padding: 0.5rem 0;

        outline: 0;

      .form-input:focus {
        border-bottom-color: #fff;

      .form-input::placeholder {
        color: #678;

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 1rem 0;
        font-size: 0.85rem;
      }
      .remember-me {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        color: #cde;
      }
      .remember-me input {
        width: 16px;
        height: 16px;
        appearance: none;
        background: #345;
        border: 2px solid #567;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
      }
      .remember-me input:checked {
        background: linear-gradient(135deg, #678, #89a);
      }
      .remember-me input:checked::after {
        content: 'âœ”';
        color: #fff;
        font-size: 0.9rem;
        position: absolute;

        transform: translate(-50%, -50%);

      .signup-link {
        color: #cde;

      .sign-in-btn {
        width: 100%;

        padding: 0.75rem;

        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 0.75rem;
      }
      .sign-in-btn:hover {
        background: linear-gradient(135deg, #f0f0f0, #ddd);
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
      }
      .sign-in-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

    <style>
      .god-rays {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 550px;
        --stripes: repeating-linear-gradient(
          100deg,
          rgba(20, 40, 60, 0.8) 0%,
          rgba(20, 40, 60, 0.8) 7%,
          transparent 10%,
          transparent 12%,
          rgba(20, 40, 60, 0.8) 16%
        );
        --rays: repeating-linear-gradient(
          100deg,
          rgba(30, 50, 90, 0.9) 10%,
          rgba(20, 40, 80, 0.9) 15%,
          rgba(30, 50, 90, 0.9) 20%,
          rgba(20, 40, 80, 0.9) 25%,
          rgba(30, 50, 90, 0.9) 30%
        );
        background-image: var(--stripes), var(--rays);
        background-size: 300%, 200%;
        background-position:
          50% 50%,
          50% 50%;
        animation: fadeIn 2s ease;
        mask-image: radial-gradient(ellipse at 100% 0%, rgba(255, 255, 255, 0) 40%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at 100% 0%, white 40%, transparent 70%);
        pointer-events: none;
        z-index: -1;
      }
      .god-rays::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: var(--stripes), var(--rays);
        background-size: 200%, 100%;
        animation: god-rays 40s linear infinite;
        background-attachment: fixed;
        mix-blend-mode: difference;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes god-rays {
        0% {
          background-position:
            0 0,
            0 0;
        }
        100% {
          background-position:
            100% 100%,
            100% 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="god-rays"></div>
    <div class="main-card">
      <div class="left-panel"></div>
      <div class="right-panel">
        <div class="header">
          <div class="brand">
            <div class="moon-icon"></div>
            PeteZah OAuth
          </div>
          <h1 class="welcome-title">Welcome back</h1>
          <p class="welcome-subtitle">Sign in for premium features!</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
          </div>
          <div class="form-options">
            <label class="remember-me"><input type="checkbox" id="remember" />Remember me</label>
            <a href="/pages/settings/p3.html" class="signup-link">Sign up</a>
          </div>
          <button type="submit" class="sign-in-btn" id="submit-btn">Sign In</button>
        </form>
      </div>
    </div>
    <script src="/storage/js/popup.js"></script>
    <script>
      (document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const t = document.getElementById('submit-btn');
        ((t.disabled = !0), (t.textContent = 'Signing in...'));
        const n = document.getElementById('email').value,
          o = document.getElementById('password').value;
        try {
          const e = await fetch('/api/signin', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({ email: n, password: o })
            }),
            i = await e.json();
          e.ok
            ? (showPopup('Login successful! Redirecting...', 'success'),
              setTimeout(() => {
                if (window.parent !== window) {
                  window.parent.postMessage({ type: 'login_success', user: i.user }, window.location.origin);
                  const e = window.frameElement;
                  e && (e.src = '/pages/settings/p2.html');
                } else window.location.href = '/pages/settings/p2.html';
              }, 500))
            : (showPopup(i.error || 'Login failed. Please try again.', 'error'), (t.disabled = !1), (t.textContent = 'Sign In'));
        } catch (e) {
          (showPopup('Network error. Please check your connection.', 'error'), (t.disabled = !1), (t.textContent = 'Sign In'));
        }
      }),
        window.parent !== window && (document.body.style.minHeight = '100vh'));
    </script>
    <script src="/storage/js/settings.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/docklib/partners@master/partner-a11f34f2.js"></script>
    <script type="text/javascript">
